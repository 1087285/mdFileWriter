name: Build & Release (Windows .exe)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project/package.json

      - name: Install dependencies
        working-directory: project
        run: npm ci

      - name: Build with electron-builder
        working-directory: project
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build artifacts
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "project/dist" -Include "*.exe" -Recurse
          if ($exeFiles.Count -gt 0) {
            Write-Host "✅ Build artifacts found:"
            $exeFiles | Select-Object Name, Length | Format-Table
          } else {
            Write-Error "❌ No .exe files found in project/dist"
            exit 1
          }

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            project/dist/*.exe
          body_path: project/document/08_release.md
          draft: false
          prerelease: false
