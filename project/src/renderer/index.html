<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MdFileWriter (WYSIWYG Markdown Editor)</title>
  <!-- Toast UI Editor CSS -->
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <button id="btn-select-folder">フォルダを開く</button>
      <button id="btn-save">保存 (Ctrl+S)</button>
      <span id="current-file"></span>
      <span id="dirty-mark"></span>
    </div>
    <div id="main-content">
      <div id="sidebar">
        <ul id="file-tree"></ul>
      </div>
      <div id="editor-container">
        <!-- Toast UI Editor -->
        <div id="editor"></div>
      </div>
    </div>
  </div>

  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
