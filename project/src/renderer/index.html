<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MdFileWriter</title>
    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="../../node_modules/@toast-ui/editor/dist/toastui-editor.min.css" />
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #app-container { display: flex; height: 100vh; }
        #left-pane { width: 250px; border-right: 1px solid #ccc; background: #f5f5f5; display: flex; flex-direction: column; }
        #right-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #file-tree { flex: 1; overflow-y: auto; padding: 5px; }
        #file-tree ul { list-style: none; padding-left: 15px; margin: 0; }
        #file-tree li { cursor: pointer; padding: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #file-tree li:hover { background: #e0e0e0; }
        #file-tree li.selected { background: #cceeff; font-weight: bold; }
        #file-tree .folder { font-weight: bold; }
        #toolbar-left { padding: 10px; border-bottom: 1px solid #ddd; }
        #toolbar-container { display: flex; align-items: center; padding: 5px; background: #eee; border-bottom: 1px solid #ccc; }
        #editor-container { flex: 1; overflow: hidden; }
        .toolbar-group { margin-right: 10px; display: flex; }
        .toolbar-group button { margin-right: 2px; padding: 5px 8px; cursor: pointer; }
        .toolbar-divider { width: 1px; height: 20px; background: #999; margin: 0 10px; }
        .toolbar-spacer { flex: 1; }
        #unsaved-indicator { display: none; color: red; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Left Pane: File Tree -->
        <div id="left-pane">
            <div id="toolbar-left">
                <button id="folder-open-btn">📂 フォルダを開く</button>
            </div>
            <div id="file-tree">
                <p style="color: #888; padding: 10px;">フォルダを選択してください</p>
            </div>
        </div>

        <!-- Right Pane: Editor -->
        <div id="right-pane">
            <div id="toolbar-container">
                <div class="toolbar-group">
                    <button id="btn-save" title="保存 (Ctrl+S)">💾 保存</button>
                    <!-- New/Delete/Rename buttons could be here or context menu -->
                    <button id="btn-new" title="新規作成">📄</button>
                    <button id="btn-delete" title="削除">🗑️</button>
                    <button id="btn-rename" title="名前変更">✏️</button>
                </div>
                <div class="toolbar-divider"></div>
                <!-- Editor formatting buttons -->
                <div class="toolbar-group">
                    <button data-cmd="Heading" data-level="1" title="H1">H1</button>
                    <button data-cmd="Heading" data-level="2" title="H2">H2</button>
                    <button data-cmd="Bold" title="太字 (Ctrl+B)"><b>B</b></button>
                    <button data-cmd="Italic" title="斜体 (Ctrl+I)"><i>I</i></button>
                    <button data-cmd="Strike" title="取り消し線"><s>S</s></button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button data-cmd="UL" title="箇条書き">•</button>
                    <button data-cmd="OL" title="番号付き">1.</button>
                    <button data-cmd="Table" title="表">📅</button>
                    <button data-cmd="Image" title="画像">🖼️</button>
                    <button data-cmd="Link" title="リンク">🔗</button>
                    <button data-cmd="Blockquote" title="引用">”</button>
                    <button data-cmd="Code" title="コード">{'}</button>
                    <button data-cmd="HR" title="水平線">―</button>
                </div>
                 <div class="toolbar-spacer"></div>
                 <div class="toolbar-group">
                     <span id="unsaved-indicator">● 未保存</span>
                     <select id="mode-switch">
                         <option value="wysiwyg">WYSIWYG</option>
                         <option value="markdown">Markdown</option>
                     </select>
                 </div>
            </div>

            <div id="editor-container"></div>
        </div>
    </div>

    <!-- Load Toast UI Editor -->
    <script src="../../node_modules/@toast-ui/editor/dist/toastui-editor-all.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
